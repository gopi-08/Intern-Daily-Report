<!DOCTYPE html>
<html>

<head>
    <title>Employee Form</title>
</head>

<body>

    <h2><b><i>Employee Registration Form</i></b></h2>

    <form>
        <label>Employee ID:</label>
        <input type="text" placeholder="Enter a ID" name="empid" required><br><br>

        <label>Employee Name:</label>
        <input type="text" placeholder="Enter a Name" name="empname" required><br><br>

        <label>Email:</label>
        <input type="email" placeholder="Enter a email" name="email" required><br><br>

        <label>Phone Number:</label>
        <input type="tel" placeholder="Enter a num" name="phone" required><br><br>
        <label for="department">Department:</label>
        <select id="department" name="department" required>
            <option value="">Select Department</option>
            <option value="HR">HR</option>
            <option value="IT">IT</option>
            <option value="Finance">Finance</option>
            <option value="Sales">Sales</option>
        </select><br>

        <br><label>Gender:</label>
        <input type="radio" name="gender"required> Male
        <input type="radio" name="gender"required> Female<br><br>

        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="4" cols="30"
            placeholder="Enter your address"></textarea><br><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
